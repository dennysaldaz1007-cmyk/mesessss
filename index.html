<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>+1 mes juntos</title>

<style>

body{

margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffe082,#ffd180,#ffccbc);
padding:25px;
box-sizing:border-box;

}

.caja{

background:white;
width:100%;
max-width:450px;
padding:35px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.15);

}

h1{

font-size:30px;
color:#333;

}

p{

font-size:20px;
line-height:1.6;
color:#555;

}

button{

margin-top:25px;
padding:14px 30px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
background:#333;
color:white;

}

</style>

</head>

<body>

<div class="caja">

<h1 id="titulo"></h1>

<p id="texto"></p>

<button id="boton" onclick="siguiente()">Siguiente</button>

</div>

<script>

const paginas=[

{

titulo:"+1 mes juntos!!",

texto:"Pero este no es un mes cualquiera. ¡Es el mes de tu cumpleaños!"

},

{

titulo:"",

texto:"Y hay algo que desde que te conozco siempre he odiado. Que no le das tanta importancia a tu cumpleaños."

},

{

titulo:"",

texto:"Y entiendo que para ti pueda ser un día más o un día X, pero para mí no. Ese día nació mi persona favorita."

},

{

titulo:"",

texto:"Y sí, ya sé que suena muy cursi y exagerado (aprovéchalo, porque no siempre soy así)."

},

{

titulo:"",

texto:"Así que sí, aunque no te guste hacer mucho por tu cumpleaños, yo sí quiero celebrarte y hacerlo especial. Porque te lo mereces."

},

{

titulo:"",

texto:"Y aunque sé que no te importa mucho cumplir años, espero que poco a poco te des cuenta de lo especial que es y empieces a emocionarte por cada cumpleaños. Y si no lo haces, pues ni modo, porque yo siempre, SIEMPRE, voy a hacerlo."

},

{

titulo:"",

texto:"Porque no, aunque para ti sea un día normal, para mí NUNCA lo va a ser. Así que deja que te celebre y lo haga especial. Y, como cada mes, te tengo una sorpresa."

},

{

titulo:"🎂 Sorpresa",

texto:"Y sí, obviamente por ser el mes de tu cumpleaños va a ser un pastel. Es muy predecible, pero es la mejor forma de empezar con la temática del mes de cumpleaños. Así que ya sabes qué hacer: mándame a qué hora vas a estar en tu casa."

},

{

titulo:"",

texto:"TE AMOOO. Y estoy muy feliz de estar otro mes contigo."

}

];

let pagina=0;

const titulo=document.getElementById("titulo");

const texto=document.getElementById("texto");

const boton=document.getElementById("boton");

function mostrar(){

titulo.innerHTML=paginas[pagina].titulo;

texto.innerHTML=paginas[pagina].texto;

if(pagina===7){

boton.innerHTML="Ver mi sorpresa";

}

if(pagina===8){

boton.innerHTML="Final ❤️";

}

}

function siguiente(){

if(pagina<paginas.length-1){

pagina++;

mostrar();

}

else{

titulo.innerHTML="❤️";

texto.innerHTML="Ya puedes cerrar esta página, pero no olvides mandarme a qué hora vas a estar en tu casa. 😌";

boton.style.display="none";

}

}

mostrar();

</script>

</body>

</html>
